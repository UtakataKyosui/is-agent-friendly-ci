name: Release v1

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG} - Initial release" \
            --notes "Initial release of is-agent-friendly-ci.

## What's included
- 8 checks covering all AI-agent-friendly CLI design principles from [the Zenn article](https://zenn.dev/assign/articles/b3d1d07d385b87)
- GitHub Actions composite action (\`action.yml\`)
- Severity-gated CI failure: \`required\` / \`recommended\` / \`all\`
- Reference sample CLI (\`test/sample_cli.sh\`)"
