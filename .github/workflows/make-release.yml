name: Make Release
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: gh release create v1.0.0 --title "v1.0.0 - Initial release" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
